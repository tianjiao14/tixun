<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>体训生考勤与成绩管理系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2312/2312217.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2312/2312217.png"
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --normal: #4CAF50;
            --leave: #FFC107;
            --absent: #F44336;
            --late: #FF9800;
            --early: #00BCD4;
            --bg: #f4f7f6;
            --accent: #2196F3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2c3e50; margin-top: 5px; font-size: 20px; }
        h3 { margin-top: 5px; margin-bottom: 10px; font-size: 16px; }
        .section { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        
        .file-input-wrapper {
            border: 2px dashed #2196F3;
            padding: 12px;
            text-align: center;
            background: #E3F2FD;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 13px;
            font-weight: bold;
            color: #0D47A1;
        }
        .file-input-wrapper input[type="file"] { display: none; }
        
        input[type="text"], input[type="date"], select {
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
        }
        button:active { opacity: 0.8; }
        
        .class-group { margin-bottom: 10px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .class-header {
            background: #e9ecef;
            padding: 12px 15px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .class-header:hover { background: #dee2e6; }
        .class-header::after { content: '▼'; font-size: 11px; color: #666; transition: transform 0.2s; }
        .class-group.open .class-header::after { content: '▲'; }
        
        .class-content { display: none; padding: 0 10px 10px 10px; background: #fff; }
        .class-group.open .class-content { display: block; }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
        }
        
        .student-info { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-wrap: wrap; 
            flex: 1;
        }
        .student-name {
            font-size: 17px; 
            font-weight: 800; 
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }
        .gender-tag { font-size: 12px; color: #666; background: #e8e8e8; padding: 1px 5px; border-radius: 4px; }
        
        .rate-badge {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #E3F2FD;
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
        }
        .rate-badge.danger-rate { background: #FFEBEE; color: var(--absent); }

        /* 达标级别标签样式 */
        .level-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
        }
        .lvl-yl { background-color: #4CAF50; }  /* 双一流绿 */
        .lvl-yx { background-color: #00BCD4; }  /* 优秀蓝 */
        .lvl-bk { background-color: #FF9800; }  /* 本科橙 */
        .lvl-nl { background-color: #9E9E9E; }  /* 继续努力灰 */

        .status-cycle-btn {
            width: 75px;
            text-align: center;
            padding: 8px 4px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            color: #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
        }
        .status-cycle-btn[data-status="leave"] { background: var(--leave); color: black; border-color: var(--leave); }
        .status-cycle-btn[data-status="absent"] { background: var(--absent); color: white; border-color: var(--absent); }
        .status-cycle-btn[data-status="late"] { background: var(--late); color: white; border-color: var(--late); }
        .status-cycle-btn[data-status="early"] { background: var(--early); color: white; border-color: var(--early); }

        .quick-add-form {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            background: #fdfdfd;
        }
        .quick-add-form input[type="text"] { flex: 2; margin: 0; padding: 7px; font-size: 13px; }
        .quick-add-form select { flex: 1; margin: 0; padding: 7px; font-size: 13px; }
        .quick-add-form button { flex: 1; margin: 0; padding: 7px; font-size: 13px; background-color: #009688; }

        .action-block { display: flex; gap: 10px; margin-top: 12px; }
        .backup-btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-secondary { background-color: #78909C; font-size: 13px; padding: 8px; flex: 1; min-width: 100px; }
        .btn-danger-sys { background-color: #d32f2f; font-size: 13px; padding: 8px; flex: 1; min-width: 100px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-content {
            background: white; padding: 20px 15px; border-radius: 10px; width: 95%; max-width: 460px;
            max-height: 90vh; overflow-y: auto; position: relative; box-sizing: border-box;
        }
        .close-modal { position: absolute; top: 8px; right: 14px; font-size: 24px; cursor: pointer; color: #aaa; z-index: 10100; }
        
        .score-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px;}
        .score-row label { font-size: 14px; font-weight: bold; width: 110px; text-align: right; shrink: 0; }
        .score-row input { flex: 1; width: auto; margin: 0; min-width: 60px; }
        .live-score-badge { width: 75px; text-align: center; font-size: 12px; padding: 4px 6px; border-radius: 4px; background: #ffebee; color: #c62828; font-weight: bold; shrink: 0; }
        .live-score-badge.has-val { background: #E8F5E9; color: #2E7D32; }

        .live-total-score-wrapper {
            background: #E3F2FD;
            border: 1px solid #BBDEFB;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            color: #0D47A1;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
        }
        .history-table th { background: #f1f3f5; color: #495057; padding: 6px; border: 1px solid #dee2e6; }
        .history-table td { padding: 6px; border: 1px solid #dee2e6; }

        .slider-wrapper { position: relative; margin-top: 10px; }
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 0, 0, 0.4); color: white;
            border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10200;
        }
        .nav-arrow.left { left: 4px; }
        .nav-arrow.right { right: 4px; }
        .calendar-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; gap: 15px; padding: 5px 0; }
        .calendar-slider::-webkit-scrollbar { display: none; }
        .month-container { flex: 0 0 100%; scroll-snap-align: start; border: 1px solid #e0e0e0; padding: 12px 10px; border-radius: 8px; background: #fff; box-sizing: border-box; }
        .month-title { text-align: center; font-weight: bold; margin-bottom: 12px; color: #2c3e50; font-size: 15px; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #777; font-weight: bold; margin-bottom: 8px; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; background: #fafafa; border: 1px solid #f0f0f0; color: #ccc; }
        .day-cell.pad { background: transparent; border: none; }
        .day-cell.cal-recorded { background: var(--normal) !important; color: white !important; font-weight: bold; } 
        .day-cell.cal-leave { background: var(--leave) !important; color: black !important; font-weight: bold; }
        .day-cell.cal-absent { background: var(--absent) !important; color: white !important; font-weight: bold; }
        .day-cell.cal-late { background: var(--late) !important; color: white !important; font-weight: bold; }
        .day-cell.cal-early { background: var(--early) !important; color: white !important; font-weight: bold; }
        .calendar-legend { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; font-size: 12px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-box { width: 13px; height: 13px; border-radius: 3px; }
        .btn-del-student { cursor: pointer; margin-left: auto; padding: 0 5px; color: #aaa; }
        .btn-del-student:hover { color: #f44336; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 体训生考勤与成绩管理系统</h2>

    <div class="section">
        <div class="file-input-wrapper" onclick="document.getElementById('excelFile').click()">
            <span id="fileStatus">🔵 导入名单/测试成绩 Excel</span>
            <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="importExcel(event)">
       
<p style="font-size: 11px; color:#777; margin: 4px 0 0 0; text-align: center;">表格需包含【班级、姓名、性别】。可追加导入【100米、立定三级跳远、铅球】成绩。</p>

    </div>
<div class="section">
        <h3>📅 设定集训/测试日期</h3>
        <input type="date" id="datePicker" style="width: 100%; font-size: 16px; font-weight: bold; border: 2px solid var(--accent);">
        <p style="font-size: 11px; color:#666; margin: 4px 0 0 0;">📌 日常签到点此日期提交考勤；录入成绩时自动以该日期的<b>年份月份</b>进行历史归档。</p>
    </div>
    <div class="section">
        <h3>集训日常打卡名单</h3>
        <div id="accordionContainer"></div>
    </div>

    <div class="section">
        <div class="action-group-btns" style="display: flex; gap: 10px;">
            <button onclick="exportCurrentMonthExcel()" style="background-color: #00897B; margin: 0; font-weight: bold; font-size: 14px; flex:1;">📋 导出本月成绩册</button>
            <button onclick="exportStatsToExcel()" style="background-color: #2E7D32; margin: 0; font-weight: bold; font-size: 14px; flex:1;">🟢 导出成绩对比总表</button>
        </div>
    </div>

    <div class="section" style="background: #fcfcfc; padding: 10px; border-radius: 6px; border: 1px dashed #bbb;">
        <h4 style="margin: 0; font-size: 13px; color: #555;">🛡️ 全量数据备份与安全</h4>
        <div class="backup-btn-group">
            <button class="btn-secondary" onclick="exportBackupData()">📥 备份导出</button>
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()" style="background-color: #5c6bc0;">📤 恢复导入</button>
            <button class="btn-danger-sys" onclick="systemReset()">🚨 初始化</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackupData(event)">
        </div>
    </div>
</div>

<div class="modal-overlay" id="calendarModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('calendarModal').style.display='none'">&times;</span>
        <div id="modalCalendarBody"></div>
    </div>
</div>

    function getYearMonthKey(dateString) {
        if(!dateString) return new Date().toISOString().substring(0, 7);
        return dateString.substring(0, 7);

    // 💡【核心添加】：达标状态级别换算功能
    function getLevelText(totalScore) {
        if (totalScore >= 55) return "达双一流标准";
        if (totalScore >= 50) return "优秀体训生";
        if (totalScore >= 40) return "达本科线水平";
        return "继续努力";
    }

    // 💡 辅助样式类选择
    function getLevelClass(levelStr) {
        if (levelStr === "达双一流标准") return "lvl-yl";
        if (levelStr === "优秀体训生") return "lvl-yx";
        if (levelStr === "达本科线水平") return "lvl-bk";
        return "lvl-nl";
    }

    function queryStandardScore(projectName, rawValue, gender) {
        if (rawValue === undefined || rawValue === null || String(rawValue).trim() === '') return null;
        let val = parseFloat(rawValue);
        if (isNaN(val)) return null;

        let typeKey = "";
        if (projectName.includes("100米")) typeKey = "m100";
        else if (projectName.includes("三级跳远")) typeKey = "jump";
        else if (projectName.includes("铅球")) typeKey = "shot";
        
        if (!typeKey || !STDS[typeKey] || !STDS[typeKey][gender]) return null;

        const ruleTable = STDS[typeKey][gender];
        const ruleKeys = Object.keys(ruleTable).map(Number).sort((a, b) => a - b);

        if (typeKey === "m100") {
            if (val <= ruleKeys[0]) return 20.0;
            if (val > ruleKeys[ruleKeys.length - 1]) return 0.0;
            for (let i = 0; i < ruleKeys.length; i++) {
                if (val <= ruleKeys[i]) return ruleTable[ruleKeys[i]];
            }
        } else {
            if (val >= ruleKeys[ruleKeys.length - 1]) return 20.0;
            if (val < ruleKeys[0]) return 0.0;
            for (let i = ruleKeys.length - 1; i >= 0; i--) {
                if (val >= ruleKeys[i]) return ruleTable[ruleKeys[i]];
            }
        }
        return 0.0;
    }

    let cachedStats = {};
    function calculateAllStats() {
        const classNames = Object.keys(students);
        const classTotalDays = {};
        cachedStats = {};
        
        classNames.forEach(c => {
            classTotalDays[c] = 0; cachedStats[c] = {};
            students[c].forEach(s => { cachedStats[c][s.name] = { leave: 0, absent: 0, late: 0, early: 0 }; });
        });

        for (let date in records) {
            const dateData = records[date];
            classNames.forEach(className => {
                if (dateData[className]) {
                    classTotalDays[className]++;
                    students[className].forEach(studentObj => {
                        const sName = studentObj.name;
                        const status = dateData[className][sName] || 'normal';
                        if (cachedStats[className] && cachedStats[className][sName] && status !== 'normal') {
                            cachedStats[className][sName][status]++;
                        }
                    });
                }
            });
        }
        return classTotalDays;
    }

    function importExcel(e) {
        const file = e.target.files[0];
        if (!file) return;
        const currentMonth = getYearMonthKey(document.getElementById('datePicker').value);
        document.getElementById('fileStatus').innerText = `正在处理归档至 ${currentMonth} 流水账...`;
        
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                if (json.length === 0) { alert('Excel内容为空！'); return; }
                
                if (!('班级' in json[0]) || !('姓名' in json[0])) {
                    alert('表头必须包含“班级”和“姓名”！'); return;
                }

                if (!scoreHistory[currentMonth]) scoreHistory[currentMonth] = {};

                let addStuCount = 0;
                let updateScoreCount = 0;

                json.forEach(row => {
                    const cls = String(row['班级']).trim();
                    const name = String(row['姓名']).trim();
                    const gender = row['性别'] ? String(row['性别']).trim() : '男';

                    if (!cls || !name) return;
                    if (!students[cls]) students[cls] = [];

                    let studentObj = students[cls].find(s => s.name === name);
                    if (!studentObj) {
                        students[cls].push({ name: name, gender: gender });
                        addStuCount++;
                    }

                    const historyKey = `${cls}_${name}`;
                    if (!scoreHistory[currentMonth][historyKey]) scoreHistory[currentMonth][historyKey] = {};

                    coreProjects.forEach(proj => {
                        if (row[proj] !== undefined && row[proj] !== null && String(row[proj]).trim() !== '') {
                            scoreHistory[currentMonth][historyKey][proj] = String(row[proj]).trim();
                            updateScoreCount++;
                        }
                    });
                });

                localStorage.setItem('tx_students_v4', JSON.stringify(students));
                localStorage.setItem('tx_score_history_v4', JSON.stringify(scoreHistory));
                alert(`🎉 归档完毕！\n新增队员：${addStuCount} 人\n已成功锁定并追加至【${currentMonth}】测试流水中。`);
                document.getElementById('fileStatus').innerText = "🔵 按当前月份导入/追加测试成绩 Excel";
                renderAccordion();
            } catch (err) {
                alert('解析失败：' + err);
            }
        };
        reader.readAsBinaryString(file);
    }

        const name = nameInput.value.trim();

        if (!name) { alert('请输入姓名！'); return; }
        if (students[className].some(s => s.name === name)) { alert(`学生已存在！`); return; }

        students[className].push({ name: name, gender: gender });
        localStorage.setItem('tx_students_v4', JSON.stringify(students));
        nameInput.value = '';

    function renderAccordion() {
        const container = document.getElementById('accordionContainer');
        container.innerHTML = '';
        const currentDate = document.getElementById('datePicker').value;
        const currentMonth = getYearMonthKey(currentDate);
        const dateRecord = records[currentDate] || {};
        const classNames = Object.keys(students);

        if (classNames.length === 0) {
            container.innerHTML = '<p style="color:#999; text-align:center; font-size:14px; padding:10px;">暂无体训队伍信息，请先由上方追加导入。</p>';
            return;
        }

        const classTotalDays = calculateAllStats();

        classNames.forEach(className => {
            const classGroup = document.createElement('div');
            classGroup.className = 'class-group';
            classGroup.id = `group-${className}`;
            
            if (openedClassesState[className]) classGroup.classList.add('open');

            const totalClasses = classTotalDays[className] || 0;
            const header = document.createElement('div');
            header.className = 'class-header';
            header.innerText = `${className} (${students[className].length}人 / 总参训${totalClasses}课时)`;
            header.onclick = () => toggleClass(classGroup, className);

            const content = document.createElement('div');
            content.className = 'class-content';
            const classTodayRecord = dateRecord[className] || {};

            students[className].forEach((studentObj, index) => {
                const sName = studentObj.name;
                const sGender = studentObj.gender;
                const currentStatus = classTodayRecord[sName] || 'normal'; 
                
                const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                const totalMissed = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                let effectiveAttendance = totalClasses - totalMissed;
                if (effectiveAttendance < 0) effectiveAttendance = 0;
                const attendanceRate = totalClasses > 0 ? ((effectiveAttendance / totalClasses) * 100).toFixed(0) : 100;
                const isDanger = parseFloat(attendanceRate) < 90;

                // 💡【实装升级】：计算当前选定月份该队员的专业总分与级别
                const historyKey = `${className}_${sName}`;
                let levelBadgeHtml = '';
                if (scoreHistory[currentMonth] && scoreHistory[currentMonth][historyKey]) {
                    let mData = scoreHistory[currentMonth][historyKey];
                    let p1 = queryStandardScore("100米", mData["100米"], sGender) || 0;
                    let p2 = queryStandardScore("立定三级跳远", mData["立定三级跳远"], sGender) || 0;
                    let p3 = queryStandardScore("铅球", mData["铅球"], sGender) || 0;
                    let totalScore = p1 + p2 + p3;
                    let lvlText = getLevelText(totalScore);
                    levelBadgeHtml = `<span class="level-badge ${getLevelClass(lvlText)}">${lvlText}</span>`;
                } else {
                    levelBadgeHtml = `<span class="level-badge lvl-nl">本月未测</span>`;
                }

                const item = document.createElement('div');
                item.className = 'student-item';
                item.innerHTML = `
                    <div class="student-info">
                        <span style="color:#aaa; font-size:12px;">${index + 1}</span>
                        <span class="student-name" onclick="openScoreModal('${className}', '${sName}')" title="进入3年多维度纵向比对">${sName}</span>
                        <span class="gender-tag">${sGender}</span>
                        <span class="rate-badge ${isDanger ? 'danger-rate' : ''}" onclick="event.stopPropagation(); showStudentCalendar('${className}', '${sName}')">出勤:${attendanceRate}%</span>
                        ${levelBadgeHtml} <span class="btn-del-student" onclick="deleteStudent('${className}', '${sName}')">🗑️</span>
                    </div>
                    <button class="status-cycle-btn" data-class="${className}" data-student="${sName}" data-status="${currentStatus}" onclick="cycleStatus(this)">
                        ${statusTextMap[currentStatus]}
                    </button>
                `;
                content.appendChild(item);
            });

            const quickAddDiv = document.createElement('div');
            quickAddDiv.className = 'quick-add-form';
            quickAddDiv.innerHTML = `
                <input type="text" id="add-name-${className}" placeholder="追加成员姓名" onclick="event.stopPropagation()">
                <select id="add-gender-${className}" onclick="event.stopPropagation()">
                    <option value="男">男</option>

            `;

            actionBlock.className = 'action-block';
            actionBlock.innerHTML = `
                <button onclick="submitClassAttendance('${className}')" style="background-color: var(--accent); flex: 3; margin:0;">确认并保存今日 ${className} 考勤状态</button>
                <button onclick="deleteClass('${className}')" style="background-color: #90A4AE; flex: 1; margin:0; font-size:13px;">解散全队</button>
            `;
            content.appendChild(actionBlock);

        });

    function openScoreModal(className, studentName) {
        event.stopPropagation();
        const studentObj = students[className].find(s => s.name === studentName);
        if(!studentObj) return;

        let gender = studentObj.gender || '男';
        let modalBody = document.getElementById('modalCalendarBody');
        const currentMonth = getYearMonthKey(document.getElementById('datePicker').value);
        
        const historyKey = `${className}_${studentName}`;
        let thisMonthScores = (scoreHistory[currentMonth] && scoreHistory[currentMonth][historyKey]) ? scoreHistory[currentMonth][historyKey] : {};

        // 🚀 核心技术点 1：扫描计算该队员跨越3年的“终身最好成绩 (PB)”
        let pbScores = { "100米": null, "立定三级跳远": null, "铅球": null };
        Object.keys(scoreHistory).forEach(m => {
            if (scoreHistory[m] && scoreHistory[m][historyKey]) {
                let sData = scoreHistory[m][historyKey];
                coreProjects.forEach(proj => {
                    if (sData[proj] !== undefined && sData[proj] !== null && sData[proj] !== '') {
                        let val = parseFloat(sData[proj]);
                        if (!isNaN(val)) {
                            if (pbScores[proj] === null) {
                                pbScores[proj] = val;
                            } else {
                                if (proj.includes("100米")) {
                                    if (val < pbScores[proj]) pbScores[proj] = val; // 100米时间越短越好
                                } else {
                                    if (val > pbScores[proj]) pbScores[proj] = val; // 跳远铅球越远越好
                                }
                            }
                        }
                    }
                });
            }
        });

        // 渲染当月录入表单
        let fieldsHtml = '';
        coreProjects.forEach(proj => {
            let val = thisMonthScores[proj] !== undefined ? thisMonthScores[proj] : '';
            let initialScore = queryStandardScore(proj, val, gender);
            let displayScore = initialScore !== null ? initialScore : 0;
            let badgeCls = initialScore !== null && initialScore > 0 ? 'has-val' : '';

            fieldsHtml += `
                <div class="score-row">
                    <label>${proj}:</label>
                    <input type="text" id="modal-score-${proj}" class="student-score-field" 
                           inputmode="decimal" data-proj="${proj}" value="${val}" placeholder="未录入成绩"
                           oninput="updateLiveScore(this, '${gender}')">
                    <div class="live-score-badge ${badgeCls}" id="live-badge-${proj}">${displayScore}分</div>
                </div>
            `;
        });

        // 历史纵向对比表倒序（最新在首行）
        let sortedMonths = Object.keys(scoreHistory).sort().reverse();
        let historyRowsHtml = '';
        
        sortedMonths.forEach(m => {
            if(scoreHistory[m] && scoreHistory[m][historyKey]) {
                let sData = scoreHistory[m][historyKey];
                let r1 = sData["100米"] || "-";
                let r2 = sData["立定三级跳远"] || "-";
                let r3 = sData["铅球"] || "-";
                
                let p1 = queryStandardScore("100米", r1, gender) || 0;
                let p2 = queryStandardScore("立定三级跳远", r2, gender) || 0;
                let p3 = queryStandardScore("铅球", r3, gender) || 0;
                let total = p1 + p2 + p3;
                let currentLvl = getLevelText(total);

                historyRowsHtml += `
                    <tr>
                        <td><b>${m}</b></td>
                        <td>${r1} (${p1}分)</td>
                        <td>${r2} (${p2}分)</td>
                        <td>${r3} (${p3}分)</td>
                        <td style="background:#E3F2FD; font-weight:bold;">${total.toFixed(2)}<br><small style="font-size:10px;color:#666;">${currentLvl}</small></td>
                    </tr>
                `;
            }
        });

        if(!historyRowsHtml) {
            historyRowsHtml = `<tr><td colspan="5" style="color:#aaa;">暂无历史月份记录。</td></tr>`;
        }

        // 🚀 核心技术点 2：将 PB 转换成可视化高亮徽章
        let pb1 = pbScores["100米"] !== null ? `${pbScores["100米"]}秒` : '未测';
        let pb2 = pbScores["立定三级跳远"] !== null ? `${pbScores["立定三级跳远"]}米` : '未测';
        let pb3 = pbScores["铅球"] !== null ? `${pbScores["铅球"]}米` : '未测';

        modalBody.innerHTML = `
            <h3 style="margin-top:5px; text-align:center;">📈 队员测试成绩纵向分析</h3>
            <p style="text-align:center; font-size:14px; margin-bottom:5px;">队员：<b>${studentName}</b> (${className}) | 锚定月份：<b style="color:var(--accent);">${currentMonth}</b></p>
            
            <div style="background: linear-gradient(135deg, #FFF9C4, #FFF59D); border: 1px solid #FBC02D; padding: 8px 10px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; color: #f57f17; display:flex; justify-content:space-around; text-align:center;">
                <div>⚡ 100m PB<br><b style="font-size:15px;">${pb1}</b></div>
                <div style="border-left:1px solid #FFF59D;"></div>
                <div>🚀 立定三级跳 PB<br><b style="font-size:15px;">${pb2}</b></div>
                <div style="border-left:1px solid #FFF59D;"></div>
                <div>☄️ 铅球 PB<br><b style="font-size:15px;">${pb3}</b></div>
            </div>

            <div id="modalScoreFieldsContainer" style="background:#f8f9fa; padding:10px; border-radius:6px; border:1px solid #e0e0e0;">
                ${fieldsHtml}

            <button onclick="saveStudentSingleScores('${className}', '${studentName}')" style="background-color: #2E7D32; font-weight: bold; margin-top:10px; margin-bottom:15px;">💾 锁定并保存 ${currentMonth} 测试数据</button>

    function updateLiveScore(inputElem, gender) {
        const proj = inputElem.getAttribute('data-proj');
        const val = inputElem.value.trim();
        const badge = document.getElementById(`live-badge-${proj}`);
        
        const calculated = queryStandardScore(proj, val, gender);
        badge.innerText = calculated !== null ? `${calculated}分` : `0分`;
        if (calculated > 0) badge.classList.add('has-val');
        else badge.classList.remove('has-val');
    }

    function saveStudentSingleScores(className, studentName) {
        const currentMonth = getYearMonthKey(document.getElementById('datePicker').value);
        const historyKey = `${className}_${studentName}`;

        if (!scoreHistory[currentMonth]) scoreHistory[currentMonth] = {};
        if (!scoreHistory[currentMonth][historyKey]) scoreHistory[currentMonth][historyKey] = {};
        
        const fields = document.querySelectorAll('.student-score-field');
        fields.forEach(f => {
            const proj = f.getAttribute('data-proj');
            const val = f.value.trim();
            if(val === '') delete scoreHistory[currentMonth][historyKey][proj];
            else scoreHistory[currentMonth][historyKey][proj] = val;
        });

        if(Object.keys(scoreHistory[currentMonth][historyKey]).length === 0) {
            delete scoreHistory[currentMonth][historyKey];
        }

        localStorage.setItem('tx_score_history_v4', JSON.stringify(scoreHistory));
        document.getElementById('calendarModal').style.display = 'none';
        renderAccordion();
    }

    function cycleStatus(btn) {
        const currentStatus = btn.getAttribute('data-status') || 'normal';
        let currentIndex = statusSequence.indexOf(currentStatus);
        let nextIndex = (currentIndex + 1) % statusSequence.length;
        const nextStatus = statusSequence[nextIndex];
        btn.setAttribute('data-status', nextStatus);
        btn.innerText = statusTextMap[nextStatus];
    }

    document.getElementById('datePicker').addEventListener('change', renderAccordion);

    function submitClassAttendance(className) {
        const date = document.getElementById('datePicker').value;
        if (!date) return;
        if (!records[date]) records[date] = {};
        if (!records[date][className]) records[date][className] = {};

        const cycleButtons = document.querySelectorAll(`.status-cycle-btn[data-class="${className}"]`);
        cycleButtons.forEach(btn => {
            const student = btn.getAttribute('data-student');
            const status = btn.getAttribute('data-status') || 'normal';
            records[date][className][student] = status;
        });

        localStorage.setItem('tx_records_v4', JSON.stringify(records));
        alert("🎉 签到日志归档完成，出勤率已刷新！");
        renderAccordion();
    }

            <p style="text-align:center; font-size:14px;">学生：<b>${studentName}</b> (${className})</p>
            <div class="calendar-legend">
                <div class="legend-item"><div class="legend-box" style="background:var(--normal);"></div>正常</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--leave)"></div>请假</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--absent)"></div>旷课</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--late)"></div>迟到</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--early)"></div>早退</div>
            </div>
            <div class="slider-wrapper">
                <button class="nav-arrow left" onclick="scrollCalendarContainer(-1)">◀</button>
                <div class="calendar-slider" id="calendarSlider"></div>
                <button class="nav-arrow right" onclick="scrollCalendarContainer(1)">▶</button>
            </div>
        `;
        let sliderContainer = document.getElementById('calendarSlider');
        uniqueMonths.forEach(ym => {
            let [year, month] = ym.split('-').map(Number);
            let firstDayIndex = new Date(year, month - 1, 1).getDay();
            let daysInMonth = new Date(year, month, 0).getDate();
            let monthHtml = `<div class="month-container"><div class="month-title">📍 ${year}年${month}月</div><div class="calendar-weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="calendar-days">`;
            for (let i = 0; i < firstDayIndex; i++) monthHtml += `<div class="day-cell pad"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                let dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                let status = (records[dateStr] && records[dateStr][className]) ? (records[dateStr][className][studentName] || 'normal') : 'none';
                let cls = '';
                if (status === 'normal') cls = 'cal-recorded';
                else if (status === 'leave') cls = 'cal-leave';
                else if (status === 'absent') cls = 'cal-absent';
                else if (status === 'late') cls = 'cal-late';
                else if (status === 'early') cls = 'cal-early';
                monthHtml += `<div class="day-cell ${cls}"><span>${day}</span></div>`;
            }
            monthHtml += `</div></div>`; sliderContainer.innerHTML += monthHtml;
        });
        document.getElementById('calendarModal').style.display = 'flex';
        setTimeout(() => { sliderContainer.scrollLeft = sliderContainer.scrollWidth; }, 60);
    }

    function scrollCalendarContainer(dir) { const s = document.getElementById('calendarSlider'); if (s) s.scrollBy({ left: dir * s.clientWidth, behavior: 'smooth' }); }

    // 💡【实装升级】：Excel 导出数据也自动平铺追加“达标状态列”
    function exportStatsToExcel() {
        const classNames = Object.keys(students);
        if (classNames.length === 0) { alert('暂无队伍数据'); return; }

        let sortedMonths = Object.keys(scoreHistory).sort();
        const classTotalDays = calculateAllStats();

        let row1 = ["序号", "队伍班级", "姓名", "组别", "累计总出勤率"];
        sortedMonths.forEach(m => {
            row1.push(`${m} 100米`, `${m} 三级跳远`, `${m} 原地铅球`, `${m} 专项总分`, `${m} 达标状态`);
        });

        let dataRows = [row1];

        classNames.forEach(className => {
            const totalClasses = classTotalDays[className] || 0;

            students[className].forEach((studentObj, index) => {
                const sName = studentObj.name;
                const sGender = studentObj.gender;
                const historyKey = `${className}_${sName}`;

                const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                const totalMissed = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                let effectiveAttendance = totalClasses - totalMissed;
                if (effectiveAttendance < 0) effectiveAttendance = 0;
                const attendanceRate = totalClasses > 0 ? ((effectiveAttendance / totalClasses) * 100).toFixed(0) + "%" : "100%";

                let rowCells = [index + 1, className, sName, sGender, attendanceRate];

                sortedMonths.forEach(m => {
                    const monthData = (scoreHistory[m] && scoreHistory[m][historyKey]) ? scoreHistory[m][historyKey] : null;
                    if(monthData) {
                        let r1 = monthData["100米"] || "-";
                        let r2 = monthData["立定三级跳远"] || "-";
                        let r3 = monthData["铅球"] || "-";
                        
                        let p1 = queryStandardScore("100米", r1, sGender) || 0;
                        let p2 = queryStandardScore("立定三级跳远", r2, sGender) || 0;
                        let p3 = queryStandardScore("铅球", r3, sGender) || 0;
                        let total = p1 + p2 + p3;

                        rowCells.push(r1, r2, r3, total.toFixed(2), getLevelText(total)); // 👈 Excel单元格完美注入
                    } else {
                        rowCells.push("-", "-", "-", "未测", "-");
                    }
                });

                dataRows.push(rowCells);
            });
        });

        const ws = XLSX.utils.aoa_to_sheet(dataRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "长周期训练册");
        XLSX.writeFile(wb, `体训长周期数据跟踪总表_${new Date().toISOString().slice(0, 10)}.xlsx`);
    }

    function deleteStudent(className, studentName) {
        if (confirm(`确定要从花名册中移除【${studentName}】吗？`)) {
            students[className] = students[className].filter(s => s.name !== studentName);
            localStorage.setItem('tx_students_v4', JSON.stringify(students));
            renderAccordion();
        }
    }

    function deleteClass(className) {
        if (confirm(`确定彻底解散【${className}】花名册吗？`)) {
            delete students[className];
            localStorage.setItem('tx_students_v4', JSON.stringify(students));
            renderAccordion();
        }
    }

    function toggleClass(classGroup, className) { 
        classGroup.classList.toggle('open'); 
        openedClassesState[className] = classGroup.classList.contains('open');
        localStorage.setItem('tx_open_state_v4', JSON.stringify(openedClassesState));
    }

    function closeModal(e) { if(e.target.id === 'calendarModal') document.getElementById('calendarModal').style.display='none'; }
    
    function exportBackupData() {
        const d = JSON.stringify({ students: students, records: records, scoreHistory: scoreHistory });
        const blob = new Blob([d], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = `体训全量跟踪库备份.json`; a.click();
    }
    function importBackupData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const backData = JSON.parse(evt.target.result);
                if (backData.students || backData.scoreHistory || backData.records) {
                    students = backData.students || {}; 
                    records = backData.records || {};
                    scoreHistory = backData.scoreHistory || {};
                    localStorage.setItem('tx_students_v4', JSON.stringify(students));
                    localStorage.setItem('tx_records_v4', JSON.stringify(records));
                    localStorage.setItem('tx_score_history_v4', JSON.stringify(scoreHistory));
                    alert("🎉 全量系统恢复成功，出勤率与3年流水已就位！"); renderAccordion();
                }
            } catch(err) { alert("文件解析失败"); }
        };
        reader.readAsText(file);
    }
// 🚀 新增：仅导出当前选定月份单次测试成绩册的函数
    function exportCurrentMonthExcel() {
        const classNames = Object.keys(students);
        if (classNames.length === 0) { alert('暂无队伍数据'); return; }

        const currentMonth = getYearMonthKey(document.getElementById('datePicker').value);
        
        // 构建单月表头
        let dataRows = [
            ["序号", "队伍班级", "姓名", "组别", `${currentMonth} 100米成绩`, "100米得分", `${currentMonth} 三级跳远成绩`, "三级跳远得分", `${currentMonth} 铅球成绩`, "铅球得分", "专项总分(满分60)", "达标状态评估"]
        ];

        classNames.forEach(className => {
            students[className].forEach((studentObj, index) => {
                const sName = studentObj.name;
                const sGender = studentObj.gender;
                const historyKey = `${className}_${sName}`;

                // 提取指定月份数据
                const monthData = (scoreHistory[currentMonth] && scoreHistory[currentMonth][historyKey]) ? scoreHistory[currentMonth][historyKey] : null;
                
                if (monthData) {
                    let r1 = monthData["100米"] || "-";
                    let p1 = queryStandardScore("100米", r1, sGender) || 0;

                    let r2 = monthData["立定三级跳远"] || "-";
                    let p2 = queryStandardScore("立定三级跳远", r2, sGender) || 0;

                    let r3 = monthData["铅球"] || "-";
                    let p3 = queryStandardScore("铅球", r3, sGender) || 0;

                    let total = p1 + p2 + p3;

                    dataRows.push([
                        index + 1, className, sName, sGender, r1, p1, r2, p2, r3, p3, total.toFixed(2), getLevelText(total)
                    ]);
                } else {
                    // 本月缺测人员
                    dataRows.push([
                        index + 1, className, sName, sGender, "-", 0, "-", 0, "-", 0, "0.00", "本月缺测"
                    ]);
                }
            });
        });

        const ws = XLSX.utils.aoa_to_sheet(dataRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `${currentMonth}测试册`);
        XLSX.writeFile(wb, `体训生单次测试成绩册_${currentMonth}.xlsx`);
    }
    function systemReset() {
        if (prompt("数据清空请输入 admin:") === "admin") {
            localStorage.clear(); location.reload();
        }
    }
</script>
