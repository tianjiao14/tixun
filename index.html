<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体训生纵向测试与集训考勤系统</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2312/2312217.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/179/179249.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --normal: #4CAF50;
            --leave: #FFC107;
            --absent: #F44336;
            --late: #FF9800;
            --early: #00BCD4;
            --bg: #f4f7f6;
            --accent: #2196F3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .system-nav {
            display: flex;
            gap: 5px;
            background: #e9ecef;
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            font-size: 15px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            user-select: none;
        }
        .nav-tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 4px rgba(33, 150, 243, 0.3);
        }

        h2 { text-align: center; color: #2c3e50; margin-top: 5px; font-size: 20px; }
        h3 { margin-top: 5px; margin-bottom: 10px; font-size: 16px; }
        .section { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        
        .file-input-wrapper {
            border: 2px dashed #4CAF50;
            padding: 12px;
            text-align: center;
            background: #f1f8e9;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 13px;
            font-weight: bold;
            color: #2E7D32;
        }
        .file-input-wrapper.tx-theme {
            border-color: #2196F3;
            background: #E3F2FD;
            color: #0D47A1;
        }
        .file-input-wrapper input[type="file"] { display: none; }
        
        input[type="text"], input[type="date"], input[type="number"], select {
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
        }
        button.tx-btn { background-color: #2196F3; }
        button:active { opacity: 0.8; }
        
        .class-group { margin-bottom: 10px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .class-header {
            background: #e9ecef;
            padding: 12px 15px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .class-header:hover { background: #dee2e6; }
        .class-header::after { content: '▼'; font-size: 11px; color: #666; transition: transform 0.2s; }
        .class-group.open .class-header::after { content: '▲'; }
        
        .class-content { display: none; padding: 0 10px 10px 10px; background: #fff; }
        .class-group.open .class-content { display: block; }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
        }
        
        .student-info { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-wrap: wrap; 
            flex: 1;
        }
        .student-name {
            font-size: 17px; 
            font-weight: 800; 
            color: #2196F3;
            cursor: pointer;
            text-decoration: underline;
        }
        .student-name:hover { color: #0b7dda; }
        .gender-tag { font-size: 12px; color: #666; background: #e8e8e8; padding: 1px 5px; border-radius: 4px; }
        
        .rate-badge {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #E3F2FD;
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
        }
        .rate-badge.danger-rate { background: #FFEBEE; color: var(--absent); }

        .unrecorded-alert-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #FFEBEE;
            color: #D32F2F;
            font-weight: bold;
            border: 1px solid #FFCDD2;
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0 { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); }
            70% { box-shadow: 0 0 0 5px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        .level-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: white; }
        .lvl-yl { background-color: #4CAF50; }
        .lvl-yx { background-color: #00BCD4; }
        .lvl-bk { background-color: #FF9800; }
        .lvl-nl { background-color: #9E9E9E; }

        .status-cycle-btn {
            width: 75px;
            text-align: center;
            padding: 8px 4px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            color: #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
        }

        .quick-add-form {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            background: #fdfdfd;
        }
        .quick-add-form input[type="text"], .quick-add-form input[type="number"] { flex: 2; margin: 0; padding: 7px; font-size: 13px; }
        .quick-add-form select { flex: 1; margin: 0; padding: 7px; font-size: 13px; }
        .quick-add-form button { flex: 1; margin: 0; padding: 7px; font-size: 13px; background-color: #009688; border: none; color: white; border-radius: 5px; }

        .action-block { display: flex; gap: 10px; margin-top: 12px; }
        .backup-btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-secondary { background-color: #78909C; font-size: 13px; padding: 8px; flex: 1; min-width: 100px; }
        .btn-danger-sys { background-color: #d32f2f; font-size: 13px; padding: 8px; flex: 1; min-width: 100px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-content {
            background: white; padding: 20px 15px; border-radius: 10px; width: 95%; max-width: 460px;
            max-height: 90vh; overflow-y: auto; position: relative; box-sizing: border-box;
        }
        .close-modal { position: absolute; top: 8px; right: 14px; font-size: 24px; cursor: pointer; color: #aaa; user-select: none; z-index: 10100; }
        
        .score-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px;}
        .score-row label { font-size: 14px; font-weight: bold; width: 110px; text-align: right; shrink: 0; }
        .score-row input { flex: 1; width: auto; margin: 0; min-width: 60px; }
        .live-score-badge { width: 75px; text-align: center; font-size: 12px; padding: 4px 6px; border-radius: 4px; background: #ffebee; color: #c62828; font-weight: bold; shrink: 0; }
        .live-score-badge.has-val { background: #E8F5E9; color: #2E7D32; }

        .live-total-score-wrapper {
            background: #E3F2FD;
            border: 1px solid #BBDEFB;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            color: #0D47A1;
        }

        .history-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; text-align: center; }
        .history-table th { background: #f1f3f5; color: #495057; padding: 6px; border: 1px solid #dee2e6; }
        .history-table td { padding: 6px; border: 1px solid #dee2e6; }

        /* 评分标准设置页专用样式 */
        .std-card { background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-bottom: 12px; }
        .std-card-title-bar { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .std-card-title { font-weight: bold; font-size: 15px; color: #37474F; }
        .std-card-title::before { content: '📁 '; }
        .std-card.open .std-card-title::before { content: '📂 '; }
        .std-card-content { display: none; margin-top: 10px; }
        .std-card.open .std-card-content { display: block; }
        .std-table { width: 100%; font-size: 13px; text-align: center; border-collapse: collapse; margin-top: 5px; }
        .std-table th, .std-table td { border: 1px solid #ddd; padding: 5px; }
        .std-table input { width: 100%; border: none; text-align: center; padding: 4px 0; background: #fffde7; }
        .btn-small-del { background: #ff5252; color: white; padding: 2px 6px; font-size: 11px; border-radius: 3px; width: auto; margin: 0; }

        .slider-wrapper { position: relative; margin-top: 10px; }
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 0, 0, 0.4); color: white;
            border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10200;
        }
        .nav-arrow.left { left: 4px; }
        .nav-arrow.right { right: 4px; }
        .calendar-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; gap: 15px; padding: 5px 0; }
        .calendar-slider::-webkit-scrollbar { display: none; }
        .month-container { flex: 0 0 100%; scroll-snap-align: start; border: 1px solid #e0e0e0; padding: 12px 10px; border-radius: 8px; background: #fff; box-sizing: border-box; }
        .month-title { text-align: center; font-weight: bold; margin-bottom: 12px; color: #2c3e50; font-size: 15px; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #777; font-weight: bold; margin-bottom: 8px; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; background: #fafafa; border: 1px solid #f0f0f0; color: #ccc; }
        .day-cell.pad { background: transparent; border: none; }
        .day-cell.cal-recorded { background: var(--normal) !important; color: white !important; font-weight: bold; } 
        .day-cell.cal-leave { background: var(--leave) !important; color: black !important; font-weight: bold; }
        .day-cell.cal-absent { background: var(--absent) !important; color: white !important; font-weight: bold; }
        .day-cell.cal-late { background: var(--late) !important; color: white !important; font-weight: bold; }
        .day-cell.cal-early { background: var(--early) !important; color: white !important; font-weight: bold; }
        .calendar-legend { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; font-size: 12px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-box { width: 13px; height: 13px; border-radius: 3px; }
        .btn-del-student { cursor: pointer; margin-left: auto; padding: 0 5px; color: #aaa; font-size: 13px; }
        .btn-del-student:hover { color: #f44336; }
    </style>
</head>
<body>

<div class="container">
    <div class="system-nav" id="topNav">
        <div class="nav-tab active" id="tab-ty" onclick="switchModule('ty')">体育课</div>
        <div class="nav-tab" id="tab-tx" onclick="switchModule('tx')">体训队</div>
        <div class="nav-tab" id="tab-db" onclick="switchModule('db')">代表队</div>
    </div>

    <div id="mainWorkspace">
        <h2 id="sysTitle">📋 体育课考勤与成绩管理系统</h2>

        <div class="section">
            <div id="fileWrapper" class="file-input-wrapper" onclick="document.getElementById('excelFile').click()">
                <span id="fileStatus">🟢 导入/追加 Excel</span>
                <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="importExcel(event)">
            </div>
            <p id="fileTip" style="font-size: 11px; color:#777; margin: 4px 0 0 0; text-align: center;"></p>
        </div>

        <div class="section">
            <h3 id="dateLabel">今日考勤</h3>
            <input type="date" id="datePicker" style="width: 100%; margin-bottom: 10px;">
            <div id="accordionContainer"></div>
        </div>

        <div class="section" id="exportBlock"></div>
    </div>

    <div id="standardsWorkspace" style="display: none;">
        <h2>⚙️ 评分标准可视化配置</h2>
        <div class="section">
            <label style="font-weight: bold;">1. 选择要修改的标准系统：</label>
            <select id="stdSystemSelect" style="width: 100%; margin-bottom: 10px;" onchange="renderStandardsEditor()">
                <option value="ty">体育课标准体系</option>
                <option value="tx">体训生专项体系</option>
            </select>  
<button id="toggleDefaultStdBtn" onclick="toggleDefaultStandardsDisplay()" style="background-color: #78909C; font-size:13px; padding:6px; margin-bottom:10px;">展开内置默认标准</button>
            
            <div id="defaultStandardsContainer" style="display: none; background: #eceff1; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 12px;">
                <p style="margin:0 0 5px 0; font-weight:bold; color:#37474F;">💡 内置标准说明：</p>
                <span style="color:#555;">系统已内置国家体质健康测试标准\四川体考三基标准。点击下方项目的标题即可展开对应的详细表格进行数值维护。</span>
            </div>
        </div>
        <div class="section" style="background: #f1f8e9; padding: 10px; border-radius: 6px; border: 1px dashed #7cb342;">
            <h4 style="margin: 0 0 8px 0; font-size: 14px; color: #33691e;">➕ 添加项目</h4>
            <div class="quick-add-form" style="background: transparent; padding:0; border:none;">
                <input type="text" id="newStdProjectName" placeholder="如: 200米" style="flex:1.5;">
                <select id="newStdGroupSelect" style="flex:1.5;">
                </select>
                <button onclick="createNewProjectStandardRow()" style="background:#558b2f; margin:0; padding:8px;">创建标签</button>
            </div>
        </div>

        <div id="standardsEditorContainer"></div>

        <button onclick="saveAllStandardsToStorage()" style="background-color: #2E7D32; font-size:16px; font-weight:bold; margin-top:15px; margin-bottom:10px;">💾 保存并更新标准</button>
        <button onclick="resetStandardsToDefault()" style="background-color: #b0bec5; color:#37474F; font-size:12px; padding:5px; width:auto; display:block; margin:0 auto;">🔄 恢复默认标准预设</button>
    </div>

    <div class="section" style="background: #fcfcfc; padding: 10px; border-radius: 6px; border: 1px dashed #bbb; margin-top:15px;">
        <h4 style="margin: 0 0 8px 0; font-size: 13px; color: #555;">⚙️ 配置与安全控制台</h4>
        <div style="margin-bottom: 12px;">
            <button id="toggleConfigPageBtn" onclick="toggleConfigWorkspace()" style="background-color: #607D8B; color: white; font-weight: bold; margin: 0; padding: 10px;">📊评分标准设置</button>
        </div>
        <div class="backup-btn-group">
            <button class="btn-secondary" onclick="exportBackupData()">📥 导出备份</button>
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()" style="background-color: #5c6bc0;">📤 导入备份</button>
            <button class="btn-danger-sys" onclick="systemReset()">🚨 初始化</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackupData(event)">
        </div>
    </div>
</div>

<div class="modal-overlay" id="calendarModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('calendarModal').style.display='none'">&times;</span>
        <div id="modalCalendarBody"></div>
    </div>
</div>

    function queryStandardScore(projectName, rawValue, className, gender) {
        if (rawValue === undefined || rawValue === null || String(rawValue).trim() === '') return null;
        let val = parseFloat(rawValue);
        if (isNaN(val)) return null;

        initializeSystemStandards();

        if (previousBusinessModule === 'ty') {
            let gradeKey = "初一"; 
            ["初一","初二","初三","高一","高二","高三"].forEach(g => { if(className.includes(g)) gradeKey = g; });
            const stdKey = `${gradeKey}${gender}`; 

            let targetProjectCode = "";
            if (projectName.includes("50米")) targetProjectCode = "run50";
            else if (projectName.includes("跳远")) targetProjectCode = "jump";
            else if (projectName.includes("体前屈")) targetProjectCode = "sit";
            else if (projectName.includes("仰卧起坐") || projectName.includes("引体向上")) targetProjectCode = "str";
            else if (projectName.includes("1000米") || projectName.includes("800米") || projectName.includes("耐力跑")) {
                targetProjectCode = "runL";
                if (String(rawValue).includes('.')) {
                    let parts = String(rawValue).split('.');
                    let mins = parseInt(parts[0], 10) || 0;
                    let secs = parseInt(parts[1], 10) || 0;
                    val = mins * 60 + secs;
                }
            } else {
                targetProjectCode = projectName;
            }

            const activePool = currentTYStandards[targetProjectCode];
            if (!activePool || !activePool[stdKey]) {
                if (val > 100) return 100;
                return val < 0 ? 0 : Math.round(val);
            }

            const ruleList = activePool[stdKey];
            if (ruleList.length === 0) return 0;

            let isTimeType = targetProjectCode.includes("run") || targetProjectCode.includes("米") || targetProjectCode.includes("跑");
            
            if (isTimeType) {
                if (val <= ruleList[0][0]) return ruleList[0][1];
                if (val > ruleList[ruleList.length - 1][0]) return 0;
                for (let i = 0; i < ruleList.length; i++) {
                    if (val <= ruleList[i][0]) return ruleList[i][1];
                }
                return 0;
            } else {
                let actualVal = val;
                if (targetProjectCode === "jump" && val < 5) actualVal = Math.round(val * 100); 
                if (actualVal >= ruleList[0][0]) return ruleList[0][1];
                if (actualVal < ruleList[ruleList.length - 1][0]) return 0;
                for (let i = 0; i < ruleList.length; i++) {
                    if (actualVal >= ruleList[i][0]) return ruleList[i][1];
                }
                return 0;
            }
        } else {
            let targetProjectCode = "";
            let isTimeType = false;

            if (projectName.includes("100米") || projectName === "m100") {
                targetProjectCode = "m100";
                isTimeType = true;
            } else if (projectName.includes("三级跳远") || projectName === "jump") {
                targetProjectCode = "jump";
                isTimeType = false;
            } else if (projectName.includes("铅球") || projectName === "shot") {
                targetProjectCode = "shot";
                isTimeType = false;
            } else {
                targetProjectCode = projectName; 
                isTimeType = projectName.includes("100") || projectName.includes("m") || projectName.includes("跑") || projectName.includes("秒");
            }

            const activePool = currentTXStandards[targetProjectCode];
            if (!activePool || !activePool[gender]) return null;

            const ruleList = activePool[gender];
            if(ruleList.length === 0) return 0;
            
            if (isTimeType) {
                if (val <= ruleList[0][0]) return ruleList[0][1];
                if (val > ruleList[ruleList.length - 1][0]) return 0.0;
                for (let i = 0; i < ruleList.length; i++) {
                    if (val <= ruleList[i][0]) return ruleList[i][1];
                }
            } else {
                if (val >= ruleList[ruleList.length - 1][0]) return ruleList[ruleList.length - 1][1];
                if (val < ruleList[0][0]) return 0.0;
                for (let i = ruleList.length - 1; i >= 0; i--) {
                    if (val >= ruleList[i][0]) return ruleList[i][1];
                }
            }
            return 0.0;
        }
    }

    function addStandardStep(sys, proj, group) {
        activeEditingProject = proj;

        else currentTXStandards[proj][group].push([0, 0]);
        renderStandardsEditor();
    }

    function deleteStandardStep(sys, proj, group, idx) {
        activeEditingProject = proj; 
        if(sys === 'ty') currentTYStandards[proj][group].splice(idx, 1);
        else currentTXStandards[proj][group].splice(idx, 1);
        renderStandardsEditor();

    function createNewProjectStandardRow() {
        const sysType = document.getElementById('stdSystemSelect').value;
        const name = document.getElementById('newStdProjectName').value.trim();
        
        if(!name) { alert('请输入需挂载的项目名称！'); return; }

        if(sysType === 'ty') {
            if(currentTYStandards[name]) { alert('项目已存在！'); return; }
            currentTYStandards[name] = {};
            ["初一男","初一女","初二男","初二女","初三男","初三女","高一男","高一女","高二男","高二女","高三男","高三女"].forEach(g => {
                currentTYStandards[name][g] = [[10, 100], [20, 60]];
            });
        } else {
            if(currentTXStandards[name] || name==="m100" || name==="jump" || name==="shot" || name==="100米" || name==="立定三级跳远" || name==="铅球") { alert('项目已存在！'); return; }

    function saveAllStandardsToStorage() {
        const inputs = document.querySelectorAll('#standardsEditorContainer input');
        inputs.forEach(input => {
            const sys = input.getAttribute('data-sys');
            const proj = input.getAttribute('data-proj');
            const group = input.getAttribute('data-group');
            const idx = parseInt(input.getAttribute('data-idx'));
            const cell = parseInt(input.getAttribute('data-cell'));
            const val = parseFloat(input.value) || 0;

            if(sys === 'ty') {
                if(currentTYStandards[proj] && currentTYStandards[proj][group] && currentTYStandards[proj][group][idx]) {
                    currentTYStandards[proj][group][idx][cell] = val;
                }
            } else {
                if(currentTXStandards[proj] && currentTXStandards[proj][group] && currentTXStandards[proj][group][idx]) {
                    currentTXStandards[proj][group][idx][cell] = val;
                }
            }
        });

        Object.keys(currentTYStandards).forEach(p => {
            Object.keys(currentTYStandards[p]).forEach(g => {
                let isTime = p.includes("run") || p.includes("跑") || p.includes("米");
                currentTYStandards[p][g].sort((a,b) => isTime ? a[0]-b[0] : b[0]-a[0]);
            });
        });
        Object.keys(currentTXStandards).forEach(p => {
            Object.keys(currentTXStandards[p]).forEach(g => {
                currentTXStandards[p][g].sort((a,b) => a[0]-b[0]);
            });
        });

        localStorage.setItem('sys_ty_standards', JSON.stringify(currentTYStandards));
        localStorage.setItem('sys_tx_standards', JSON.stringify(currentTXStandards));
        
        alert('🎉 外挂评分标准已锁定更新！');
        toggleConfigWorkspace(); 
    }

    function resetStandardsToDefault() {
        if(confirm('确认要还原至系统最初出厂设置吗？')) {
            localStorage.setItem('sys_ty_standards', JSON.stringify(DEFAULT_TY_STDS));
            localStorage.setItem('sys_tx_standards', JSON.stringify(DEFAULT_TX_STDS));
            currentTYStandards = JSON.parse(JSON.stringify(DEFAULT_TY_STDS));
            currentTXStandards = JSON.parse(JSON.stringify(DEFAULT_TX_STDS));
            activeEditingProject = '';
            showToast('已重置标准');
            renderStandardsEditor();
        }
    }


    // ================== 5. 出勤流水统计引擎 ==================
    let cachedStats = {};
    function calculateAllStats() {
        const classNames = Object.keys(students);
        const classTotalDays = {};
        cachedStats = {};
        
        classNames.forEach(c => {
            classTotalDays[c] = 0; cachedStats[c] = {};
            students[c].forEach(s => { cachedStats[c][s.name] = { leave: 0, absent: 0, late: 0, early: 0 }; });
        });

        for (let date in records) {
            const dateData = records[date];
            classNames.forEach(className => {
                if (dateData[className]) {
                    classTotalDays[className]++;
                    students[className].forEach(studentObj => {
                        const sName = studentObj.name;
                        const status = dateData[className][sName] || 'normal';
                        if (cachedStats[className] && cachedStats[className][sName] && status !== 'normal') {
                            cachedStats[className][sName][status]++;
                        }
                    });
                }
            });
        }
        return classTotalDays;
    }

  function importExcel(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const currentMonth = getYearMonthKey(document.getElementById('datePicker').value);
    document.getElementById('fileStatus').innerText = "正在智能追加解析...";
    
    const reader = new FileReader();
    // 💡 智能判断：如果是 CSV 文件，用文本方式读取；如果是 Excel，用二进制读取
    const isCSV = file.name.endsWith('.csv');
    
    reader.onload = function(evt) {
        try {
            const data = evt.target.result;
            let workbook;
            
            if (isCSV) {
                // 解析 CSV 文本
                workbook = XLSX.read(data, { type: 'string' });
            } else {
                // 解析 标准 Excel 二进制
                workbook = XLSX.read(data, { type: 'binary' });
            }
            
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            if (json.length === 0) { alert('表格内容为空！'); document.getElementById('fileStatus').innerText = "❌ 导入失败(空表格)"; return; }
            
            const firstRowKeys = Object.keys(json[0]);
            let classField = "", nameField = "", genderField = "";

            // 模糊包含匹配，通杀所有带括号的表头
            firstRowKeys.forEach(key => {
                let cleanedKey = String(key).replace(/\s+/g, ""); 
                if (cleanedKey.includes("班级") || cleanedKey.includes("队伍")) classField = key;
                if (cleanedKey.includes("姓名") || cleanedKey.includes("学生") || cleanedKey.includes("队员") || cleanedKey.includes("选手")) nameField = key;
                if (cleanedKey.includes("性别") || cleanedKey.includes("组别") || cleanedKey.includes("男女")) genderField = key;
            });

            if (!classField || !nameField) {
                alert('导入失败！未识别到有效的“班级”和“姓名”表头，当前表头为：' + firstRowKeys.join(', '));
                document.getElementById('fileStatus').innerText = "❌ 导入失败(表头不对)";
                return;
            }

            const projectKeys = firstRowKeys.filter(k => k !== classField && k !== nameField && k !== genderField && k !== '__rowNum__');
           let addStuCount = 0;
            let updateScoreCount = 0;

            if (currentModule === 'ty') {
                json.forEach(row => {
                    const cls = row[classField] ? String(row[classField]).trim() : '';
                    const name = row[nameField] ? String(row[nameField]).trim() : '';
                    const gender = (genderField && row[genderField]) ? String(row[genderField]).trim() : '男';

                    if (!cls || !name) return;
                    if (!students[cls]) students[cls] = [];

                    let studentObj = students[cls].find(s => s.name === name);
                    if (!studentObj) {
                        studentObj = { name: name, gender: gender, scores: {} };
                        students[cls].push(studentObj);
                        addStuCount++;
                    }

                    projectKeys.forEach(proj => {
                        if (row[proj] !== undefined && row[proj] !== null && String(row[proj]).trim() !== '') {
                            studentObj.scores[proj] = String(row[proj]).trim();
                            updateScoreCount++;
                        }
                    });
                });
                alert(`🎉 名册数据同步完成！\n新追加登记：${addStuCount} 人\n识别并追加更新项目成绩：${updateScoreCount} 项次`);
            } else if (currentModule === 'tx') {
                if (!scoreHistory[currentMonth]) scoreHistory[currentMonth] = {};

                json.forEach(row => {
                    const cls = row[classField] ? String(row[classField]).trim() : '';
                    const name = row[nameField] ? String(row[nameField]).trim() : '';
                    const gender = (genderField && row[genderField]) ? String(row[genderField]).trim() : '男';

                    if (!cls || !name) return;
                    if (!students[cls]) students[cls] = [];

                    let studentObj = students[cls].find(s => s.name === name);
                    if (!studentObj) {
                        students[cls].push({ name: name, gender: gender });
                        addStuCount++;
                    }

                    const historyKey = `${cls}_${name}`;
                    
                    firstRowKeys.forEach(proj => {
                        let cleanedProj = String(proj).replace(/\s+/g, "");
                        let targetMatchCode = "";

                        if (cleanedProj.includes("100米") || cleanedProj.includes("m100")) targetMatchCode = "100米";
                        else if (cleanedProj.includes("三级跳远") || cleanedProj.includes("jump")) targetMatchCode = "立定三级跳远";
                        else if (cleanedProj.includes("铅球") || cleanedProj.includes("shot")) targetMatchCode = "铅球";

                        if (targetMatchCode && row[proj] !== undefined && row[proj] !== null && String(row[proj]).trim() !== '') {
                            if (!scoreHistory[currentMonth][historyKey]) scoreHistory[currentMonth][historyKey] = {};
                            
                            let finalVal = String(row[proj]).trim();
                            scoreHistory[currentMonth][historyKey][targetMatchCode] = finalVal;
                            
                            let aliasKey = (targetMatchCode === "100米") ? "m100" : ((targetMatchCode === "立定三级跳远") ? "jump" : "shot");
                            scoreHistory[currentMonth][historyKey][aliasKey] = finalVal;
                            
                            updateScoreCount++;
                        }
                    });
                });
                alert(`🎉 名册归档完毕！\n新导入/同步队员：${addStuCount} 人\n成功追加锁定 ${currentMonth} 测试流水：${updateScoreCount} 项次`);
            } else if (currentModule === 'db') {
                // 🌟 代表队：只同步最精简的花名册结构
                json.forEach(row => {
                    const cls = row[classField] ? String(row[classField]).trim() : '';
                    const name = row[nameField] ? String(row[nameField]).trim() : '';
                    const gender = (genderField && row[genderField]) ? String(row[genderField]).trim() : '男';

                    if (!cls || !name) return;
                    if (!students[cls]) students[cls] = [];

                    let studentObj = students[cls].find(s => s.name === name);
                    if (!studentObj) {
                        students[cls].push({ name: name, gender: gender });
                        addStuCount++;
                    }
                });
                alert(`🎉 代表队名册导入成功！\n新追加代表队成员：${addStuCount} 人`);
            }

            saveModuleData();
            document.getElementById('fileStatus').innerText = currentModule === 'ty' ? "🟢 导入/追加 Excel" : (currentModule==='tx'?"🔵 导入名单/测试成绩 Excel":"🔮 导入代表队花名册 Excel");
            renderAccordion();
        } catch (err) {
            alert('文件解析异常，请检查格式：' + err);
            document.getElementById('fileStatus').innerText = "❌ 导入故障";
        }
    };
    
    if (isCSV) {
        reader.readAsText(file, "gbk"); // 兼容中国地区特有的 Excel 导出 CSV 编码
    } else {
        reader.readAsBinaryString(file);
    }
}

    // ================== 7. 手风琴花名册主框架渲染 ==================
  function renderAccordion() {
        const container = document.getElementById('accordionContainer');
        container.innerHTML = '';
        const currentDate = document.getElementById('datePicker').value;
        const currentMonth = typeof getYearMonthKey === 'function' ? getYearMonthKey(currentDate) : currentDate.substring(0,7);
        const dateRecord = records[currentDate] || {};
        const classNames = Object.keys(students);

        if (classNames.length === 0) {
            container.innerHTML = `<p style="color:#999; text-align:center; font-size:14px; padding:10px;">暂无名册数据，请点击上方导入名单或切换标签。</p>`;
            return;
        }

        const classTotalDays = calculateAllStats();

        classNames.forEach(className => {
            const classGroup = document.createElement('div');
            classGroup.className = 'class-group';
            classGroup.id = `group-${className}`;
            
            if (openedClassesState[className]) classGroup.classList.add('open');

            const totalClasses = classTotalDays[className] || 0;
            const header = document.createElement('div');
            header.className = 'class-header';
            
            if(currentModule === 'ty') {
                header.innerText = `${className} (${students[className].length}人 / 累积上课${totalClasses}节)`;
            } else {
                header.innerText = `${className} (${students[className].length}人 / 总参训${totalClasses}课时)`;
            }
            header.onclick = () => toggleClass(classGroup, className);

            const content = document.createElement('div');
            content.className = 'class-content';
            const classTodayRecord = dateRecord[className] || {};

            let activeClassProjs = new Set();
            if(currentModule === 'ty') {
                students[className].forEach(s => {
                    if(s.scores) {
                        Object.keys(s.scores).forEach(p => {
                            if(s.scores[p] !== undefined && s.scores[p] !== null && String(s.scores[p]).trim() !== '') {
                                activeClassProjs.add(p);
                            }
                        });
                    }
                });
            }

            students[className].forEach((studentObj, index) => {
                const sName = studentObj.name;
                const sGender = studentObj.gender;
                const currentStatus = classTodayRecord[sName] || 'normal'; 
                
                const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                const totalMissedScore = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                let effectiveAttendance = totalClasses - totalMissedScore;
                if (effectiveAttendance < 0) effectiveAttendance = 0;
                const rate = totalClasses > 0 ? ((effectiveAttendance / totalClasses) * 100).toFixed(0) : 100;
                
                let rightTagHtml = '';
                let isDanger = false;

                if(currentModule === 'ty') {
                    isDanger = parseFloat(rate) < 85;
                    let isUnrecorded = false;
                    let missingProjectNames = [];
                    activeClassProjs.forEach(proj => {
                        if (sGender === '男' && (proj.includes("800米") || proj.includes("仰卧起坐"))) return;
                        if (sGender === '女' && (proj.includes("1000米") || proj.includes("引体向上"))) return;
                        if (!studentObj.scores || studentObj.scores[proj] === undefined || studentObj.scores[proj] === null || String(studentObj.scores[proj]).trim() === '') {
                            isUnrecorded = true;
                            missingProjectNames.push(proj);
                        }
                    });
                    rightTagHtml = isUnrecorded ? `<span class="unrecorded-alert-badge" title="未录科目: ${missingProjectNames.join('、')}">● 未录</span>` : '';
                } else if(currentModule === 'tx') {
                    isDanger = parseFloat(rate) < 90;
                    const historyKey = `${className}_${sName}`;
                    if (scoreHistory && scoreHistory[currentMonth] && scoreHistory[currentMonth][historyKey]) {
                        let mData = scoreHistory[currentMonth][historyKey];
                        let p1 = queryStandardScore("100米", mData["100米"]||mData["m100"], className, sGender) || 0;
                        let p2 = queryStandardScore("立定三级跳远", mData["立定三级跳远"]||mData["jump"], className, sGender) || 0;
                        let p3 = queryStandardScore("铅球", mData["铅球"]||mData["shot"], className, sGender) || 0;

            const quickAddDiv = document.createElement('div');

                <span style="font-size:16px; margin: 0 4px; color:#009688; font-weight:bold;">➕</span>

                </select>
                <button onclick="event.stopPropagation(); quickAddStudent('${className}')">${currentModule==='ty'?'添加':'快速追加'}</button>
            `;
            content.appendChild(quickAddDiv);

            const actionBlock = document.createElement('div');
            actionBlock.className = 'action-block';

    function updateLiveScore(inputElem, className, gender) {
        const proj = inputElem.getAttribute('data-proj');
        const val = inputElem.value.trim();
        const badge = document.getElementById(`live-badge-${proj}`);
        
        const calculated = queryStandardScore(proj, val, className, gender);
        let displayScore = calculated !== null ? calculated : 0;
        badge.innerText = `${displayScore}分`;
        if (displayScore > 0) badge.classList.add('has-val');
        else badge.classList.remove('has-val');

        if(previousBusinessModule === 'ty') refreshModalTotalScore(className, gender);
    }

    function refreshModalTotalScore(className, gender) {
        const fields = document.querySelectorAll('.student-score-field');
        let validProjectsSum = 0;
        let validProjectsCount = 0; 

        fields.forEach(f => {
            const proj = f.getAttribute('data-proj');
            const val = f.value.trim();
            const calculatedPoints = queryStandardScore(proj, val, className, gender);
            if (calculatedPoints !== null) {
                validProjectsSum += calculatedPoints;
                validProjectsCount++;
            }
        });

        const studentName = document.querySelector('#modalCalendarBody b').innerText;
        const classTotalDays = calculateAllStats();
        const totalClasses = classTotalDays[className] || 0;
        
        const s = cachedStats[className][studentName] || { leave: 0, absent: 0, late: 0, early: 0 };
        const totalMissedScore = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
        let effectiveAttendance = totalClasses - totalMissedScore;
        if (effectiveAttendance < 0) effectiveAttendance = 0;
        const attendanceRateNum = totalClasses > 0 ? (effectiveAttendance / totalClasses) : 1.0;
        const attendanceFinalScore = Math.round(attendanceRateNum * 100);

        let sportsAverageScore = validProjectsCount > 0 ? (validProjectsSum / validProjectsCount) : 0;
        let finalTotalScore = Math.round((sportsAverageScore * 0.8) + (attendanceFinalScore * 0.2));

        document.getElementById('modalLiveTotalScore').innerText = `${finalTotalScore} 分`;
        const levelText = getLevelText(finalTotalScore);
        const lvlBadge = document.getElementById('modalLiveTotalLevel');
        lvlBadge.innerText = levelText;

        if(levelText === "优秀") lvlBadge.style.color = "#2E7D32";
        else if(levelText === "良好") lvlBadge.style.color = "#1565C0";
        else if(levelText === "及格") lvlBadge.style.color = "#EF6C00";
        else lvlBadge.style.color = "#C62828";
    }

    function saveStudentSingleScores(className, studentName) {
        const studentObj = students[className].find(s => s.name === studentName);
        if(!studentObj) return;

        const fields = document.querySelectorAll('.student-score-field');

        if (previousBusinessModule === 'ty') {
            if(!studentObj.scores) studentObj.scores = {};
            fields.forEach(f => {
                const proj = f.getAttribute('data-proj');
                const val = f.value.trim();
                if(val === '') delete studentObj.scores[proj];
                else studentObj.scores[proj] = val;
            });
            showToast(`已成功同步 ${studentName} 的期末成绩`);
        } else {
            const currentMonth = getYearMonthKey(document.getElementById('datePicker').value);
            const historyKey = `${className}_${studentName}`;

            if (!scoreHistory[currentMonth]) scoreHistory[currentMonth] = {};
            if (!scoreHistory[currentMonth][historyKey]) scoreHistory[currentMonth][historyKey] = {};
            
            fields.forEach(f => {
                const proj = f.getAttribute('data-proj');
                const val = f.value.trim();
                
                let unifiedKey = proj;
                if(proj === "100米") unifiedKey = "m100";
                if(proj === "立定三级跳远") unifiedKey = "jump";
                if(proj === "铅球") unifiedKey = "shot";

                if(val === '') {
                    delete scoreHistory[currentMonth][historyKey][proj];
                    delete scoreHistory[currentMonth][historyKey][unifiedKey];
                } else {
                    scoreHistory[currentMonth][historyKey][proj] = val;
                    scoreHistory[currentMonth][historyKey][unifiedKey] = val;
                }
            });
        }

        saveModuleData();
        document.getElementById('calendarModal').style.display = 'none';
        renderAccordion();
    }

    function cycleStatus(btn) {
        const currentStatus = btn.getAttribute('data-status') || 'normal';
        let currentIndex = statusSequence.indexOf(currentStatus);
        let nextIndex = (currentIndex + 1) % statusSequence.length;
        const nextStatus = statusSequence[nextIndex];
        btn.setAttribute('data-status', nextStatus);
        btn.innerText = statusTextMap[nextStatus];

        if (nextStatus === "normal") btn.style = "background:#f8f9fa; color:#444;";
        else if (nextStatus === "leave") btn.style = "background:var(--leave); color:black; border-color:var(--leave);";
        else if (nextStatus === "absent") btn.style = "background:var(--absent); color:white; border-color:var(--absent);";
        else if (nextStatus === "late") btn.style = "background:var(--late); color:white; border-color:var(--late);";
        else if (nextStatus === "early") btn.style = "background:var(--early); color:white; border-color:var(--early);";
    }

    function submitClassAttendance(className) {
        const date = document.getElementById('datePicker').value;
        if (!date) return;
        if (!records[date]) records[date] = {};
        if (!records[date][className]) records[date][className] = {};

        const cycleButtons = document.querySelectorAll(`.status-cycle-btn[data-class="${className}"]`);
        cycleButtons.forEach(btn => {
            const student = btn.getAttribute('data-student');
            const status = btn.getAttribute('data-status') || 'normal';
            records[date][className][student] = status;
        });

        saveModuleData();
        showToast(`已提交 ${className} 考勤并归档`);
        renderAccordion();
    }

            let monthHtml = `<div class="month-container"><div class="month-title">📍 ${year}年${month}月</div><div class="calendar-weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="calendar-days">`;

            for (let day = 1; day <= daysInMonth; day++) {
                let dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

        setTimeout(() => { sliderContainer.scrollLeft = sliderContainer.scrollWidth; }, 60);

            row2.push("", "", "");

                    const sGender = studentObj.gender;
                    const sScores = studentObj.scores || {};
                    let rowCells = [index + 1, className, sName, sGender];
                    let validProjectsSum = 0;
                    let validProjectsCount = 0;

                    activeProjectsList.forEach(proj => {
                        const rawValue = sScores[proj];
                        const calculatedPoints = queryStandardScore(proj, rawValue, className, sGender);
                        if (calculatedPoints !== null) { rowCells.push(rawValue, calculatedPoints); validProjectsSum += calculatedPoints; } 
                        else { rowCells.push("-", 0); }
                        validProjectsCount++;
                    });

                    const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                    const totalMissedScore = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                    let effectiveAttendance = totalClasses - totalMissedScore;
                    if (effectiveAttendance < 0) effectiveAttendance = 0;
                    const attendanceRateNum = totalClasses > 0 ? (effectiveAttendance / totalClasses) : 1.0;
                    const attendanceFinalScore = Math.round(attendanceRateNum * 100);
                    let sportsAverageScore = validProjectsCount > 0 ? (validProjectsSum / validProjectsCount) : 0;
                    let finalTotalScore = Math.round((sportsAverageScore * 0.8) + (attendanceFinalScore * 0.2));

                    rowCells.push(attendanceFinalScore, finalTotalScore, getLevelText(finalTotalScore));
                    dataRows.push(rowCells);
                });
            });

            const ws = XLSX.utils.aoa_to_sheet(dataRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "期末体育成绩册");
            XLSX.writeFile(wb, `体育期末成绩册_${new Date().toISOString().slice(0, 10)}.xlsx`);
        } else if (currentModule === 'tx') {
            let sortedMonths = scoreHistory ? Object.keys(scoreHistory).sort() : [];
            let row1 = ["序号", "队伍班级", "姓名", "组别", "累计总出勤率"];
            sortedMonths.forEach(m => { row1.push(`${m} 100米`, `${m} 三级跳远`, `${m} 原地铅球`, `${m} 专项总分`, `${m} 达标评估`); });
            let dataRows = [row1];

            classNames.forEach(className => {
                const totalClasses = classTotalDays[className] || 0;
                students[className].forEach((studentObj, index) => {
                    const sName = studentObj.name;
                    const sGender = studentObj.gender;
                    const historyKey = `${className}_${sName}`;

                    const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                    const totalMissed = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                    let effectiveAttendance = totalClasses - totalMissed;
                    if (effectiveAttendance < 0) effectiveAttendance = 0;
                    const attendanceRate = totalClasses > 0 ? ((effectiveAttendance / totalClasses) * 100).toFixed(0) + "%" : "100%";

                    let rowCells = [index + 1, className, sName, sGender, attendanceRate];
                    sortedMonths.forEach(m => {
                        const monthData = (scoreHistory[m] && scoreHistory[m][historyKey]) ? scoreHistory[m][historyKey] : null;
                        if(monthData) {
                            let r1 = monthData["100米"] || monthData["m100"] || "-";
                            let r2 = monthData["立定三级跳远"] || monthData["jump"] || "-";
                            let r3 = monthData["铅球"] || monthData["shot"] || "-";
                            let p1 = queryStandardScore("100米", r1, className, sGender) || 0;
                            let p2 = queryStandardScore("立定三级跳远", r2, className, sGender) || 0;
                            let p3 = queryStandardScore("铅球", r3, className, sGender) || 0;
                            let total = p1 + p2 + p3;
                            rowCells.push(r1, r2, r3, total.toFixed(2), getTxLevelText(total));
                        } else {
                            rowCells.push("-", "-", "-", "0.00", "-");
                        }
                    });
                    dataRows.push(rowCells);
                });
            });

            const ws = XLSX.utils.aoa_to_sheet(dataRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "长周期训练册");
            XLSX.writeFile(wb, `体训大周期跟踪表_${new Date().toISOString().slice(0, 10)}.xlsx`);
        } else if (currentModule === 'db') {
            // 🌟 代表队纯考勤大表导出
            let row1 = ["序号", "代表队队伍", "队员姓名", "性别", "累计出勤率", "请假节数", "旷课节数", "迟到节数", "早退节数"];
            let dataRows = [row1];

            classNames.forEach(className => {
                const totalClasses = classTotalDays[className] || 0;
                students[className].forEach((studentObj, index) => {
                    const sName = studentObj.name;
                    const sGender = studentObj.gender;
                    const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                    const totalMissed = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                    let effectiveAttendance = totalClasses - totalMissed;
                    if (effectiveAttendance < 0) effectiveAttendance = 0;
                    const attendanceRate = totalClasses > 0 ? ((effectiveAttendance / totalClasses) * 100).toFixed(0) + "%" : "100%";

                    dataRows.push([
                        index + 1, className, sName, sGender, attendanceRate, s.leave, s.absent, s.late, s.early
                    ]);
                });
            });

            const ws = XLSX.utils.aoa_to_sheet(dataRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "代表队出勤大表");
            XLSX.writeFile(wb, `代表队考勤汇总明细表_${new Date().toISOString().slice(0, 10)}.xlsx`);
        }
    }

    function exportCurrentMonthExcel() {
        if(currentModule === 'ty') return;
        const classNames = Object.keys(students);
        if (classNames.length === 0) { alert('暂无队伍数据'); return; }
        const currentMonth = getYearMonthKey(document.getElementById('datePicker').value);
        
        let dataRows = [
            ["序号", "队伍班级", "姓名", "组别", `${currentMonth} 100米`, `${currentMonth} 三级跳远`, `${currentMonth} 铅球`]
        ];

        classNames.forEach(className => {
            students[className].forEach((studentObj, index) => {
                const sName = studentObj.name;
                const sGender = studentObj.gender;
                const historyKey = `${className}_${sName}`;
                const monthData = (scoreHistory[currentMonth] && scoreHistory[currentMonth][historyKey]) ? scoreHistory[currentMonth][historyKey] : null;
                
                if (monthData) {
                    dataRows.push([index + 1, className, sName, sGender, monthData["100米"] || monthData["m100"] || "-", monthData["立定三级跳远"] || monthData["jump"] || "-", monthData["铅球"] || monthData["shot"] || "-"]);
                } else {
                    dataRows.push([index + 1, className, sName, sGender, "-", "-", "-"]);
                }
            });
        });

        const ws = XLSX.utils.aoa_to_sheet(dataRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `${currentMonth}测试册`);
        XLSX.writeFile(wb, `单次测试册_${currentMonth}.xlsx`);
    }

    function deleteStudent(className, studentName) {
        event.stopPropagation();
        if (confirm(`确定要从花名册中移除【${studentName}】吗？`)) {
            students[className] = students[className].filter(s => s.name !== studentName);
            saveModuleData();
            renderAccordion();
        }
    }

    function deleteClass(className) {
        if (confirm(`⚠️ 确定要解散吗？`)) {
            delete students[className];
            saveModuleData();
            renderAccordion();
        }
    }

    function toggleClass(classGroup, className) { 
        classGroup.classList.toggle('open'); 
        openedClassesState[className] = classGroup.classList.contains('open');
        saveModuleData();
    }

    function closeModal(e) { if(e.target.id === 'calendarModal') document.getElementById('calendarModal').style.display = 'none'; }
    document.getElementById('datePicker').addEventListener('change', renderAccordion);

    function exportBackupData() {
        const payload = { 
            module: currentModule, 
            students: students, 
            records: records,
            ty_stds: JSON.parse(localStorage.getItem('sys_ty_standards')),
            tx_stds: JSON.parse(localStorage.getItem('sys_tx_standards'))
        };
        if(currentModule !== 'ty') payload.scoreHistory = scoreHistory;
        
        const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `系统数据全量备份_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
    }

    function importBackupData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const backData = JSON.parse(evt.target.result);
                students = backData.students || {};
                records = backData.records || {};
                if(backData.ty_stds) localStorage.setItem('sys_ty_standards', JSON.stringify(backData.ty_stds));
                if(backData.tx_stds) localStorage.setItem('sys_tx_standards', JSON.stringify(backData.tx_stds));
                if(currentModule !== 'ty') scoreHistory = backData.scoreHistory || {};
                
                loadModuleData();
                alert("🎉 全量备份及外挂评分机制导入成功！"); 
                renderAccordion();
            } catch(err) { alert("文件解析失败"); }
        };
        reader.readAsText(file);
    }

    function systemReset() {
        if (prompt("数据清空请输入 admin:") === "admin" && confirm("确定清空缓存数据吗？")) {
            localStorage.clear();
            location.reload();
        }
    }

    function showToast(msg) {
        const tip = document.createElement('div');
        tip.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:8px 16px; border-radius:20px; font-size:13px; z-index:9999;";
        tip.innerText = msg; document.body.appendChild(tip); setTimeout(() => tip.remove(), 1200);
    }
</script>
